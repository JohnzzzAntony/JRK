{% extends 'base.html' %}
{% load static %}

{% block content %}
<section class="py-5 mt-5 bg-light">
    <div class="container py-5">
        <h2 class="mb-5 text-center section-title">Your <span style="color:var(--accent-blue)">Enquiry Cart</span></h2>
        
        <div class="row">
            <div class="col-lg-8">
                <div class="card border-0 shadow-sm rounded-lg mb-4">
                    <div class="card-body p-4">
                        <div class="table-responsive">
                            <table class="table align-middle text-center mb-0">
                                <thead>
                                    <tr>
                                        <th scope="col" class="text-left">Product</th>
                                        <th scope="col">Price</th>
                                        <th scope="col">Quantity</th>
                                        <th scope="col">Total</th>
                                        <th scope="col">Action</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <!-- Cart Items will be populated dynamically -->
                                    <tr>
                                        <td colspan="5" class="p-5 text-muted h5 text-center">
                                            <i class="fas fa-shopping-cart fa-3x mb-3 text-secondary"></i><br>
                                            Your enquiry cart is currently empty.
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
                <div class="d-flex justify-content-between mb-4">
                    <a href="{% url 'product_list' %}" class="btn btn-outline-dark px-4 py-2" style="border-radius: 30px;"><i class="fa fa-arrow-left mr-2"></i>Continue Shopping</a>
                </div>
            </div>
            
            <div class="col-lg-4">
                <div class="card border-0 shadow-sm rounded-lg">
                    <div class="card-header bg-white border-0 pt-4 pb-0 text-center">
                        <h4 class="font-weight-bold">Summary</h4>
                    </div>
                    <div class="card-body p-4">
                        <div class="d-flex justify-content-between mb-3">
                            <h6 class="font-weight-medium">Subtotal</h6>
                            <h6 class="font-weight-medium">$0.00</h6>
                        </div>
                        <div class="d-flex justify-content-between">
                            <h6 class="font-weight-medium">Estimated Shipping</h6>
                            <h6 class="font-weight-medium">$0.00</h6>
                        </div>
                    </div>
                    <div class="card-footer bg-white border-top-0 p-4 pt-0">
                        <div class="d-flex justify-content-between mt-2 mb-4">
                            <h5 class="font-weight-bold">Total Request</h5>
                            <h5 class="font-weight-bold text-primary">$0.00</h5>
                        </div>
                        <a href="{% url 'contact' %}" class="btn btn-primary btn-block py-3 shadow" style="border-radius: 30px; background-color: var(--accent-blue);">Proceed to Checkout</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
